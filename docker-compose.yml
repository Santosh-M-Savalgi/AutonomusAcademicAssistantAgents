services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 8000
      JWT_SECRET_KEY: "dev-jwt-secret-not-for-production"
      POSTGRES_DSN: postgresql+asyncpg://aaa:aaa_password@postgres:5432/aaa
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_HEALTH_PATH: /minio/health/ready

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aaa
      POSTGRES_USER: aaa
      POSTGRES_PASSWORD: "aaa_password"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aaa -d aaa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: aaa_minio
      MINIO_ROOT_PASSWORD: "minio_dev_password_123"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  minio_data:
